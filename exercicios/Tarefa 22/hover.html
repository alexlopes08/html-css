<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <title>Exercício de Pseudo-classes (hover)</title>

    <style>
        body {
            font-family: Arial, sans-serif;
        }

        h1 {
            text-align: center;
        }

        /* Caixas */
        .container {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 40px;
        }

        .caixa {
            width: 200px;
            height: 200px;
            background-color: lightgray;
            border: 1px solid black;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
        }

        /* Hover das caixas */
        .caixa:hover {
            background-color: yellow;
            color: red;
        }

        /* Área de texto escondido */
        .hover-texto {
            width: fit-content;
            margin: auto;
        }

        .detalhes {
            display: none;
            background-color: red;
            color: white;
            width: 300px;
            padding: 10px;
            margin-top: 10px;
        }

        /* Mostrar detalhes ao passar o rato */
        .hover-texto:hover .detalhes {
            display: block;
        }
    </style>
</head>

<body>

    <h1>Exercício de Pseudo-classes (hover) Alexandre Lopes </h1>

    <div class="container">
        <div class="caixa">Informação 1</div>
        <div class="caixa">Informação 2</div>
        <div class="caixa">Informação 3</div>
    </div>

    <div class="hover-texto">
        <p>Passe o rato sobre o bloco para ver mais detalhes</p>
        <p class="detalhes">Detalhes escondidos</p>
    </div>

</body>
</html>
