<!DOCTYPE html>
<html lang="pt-pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mídias em HTML5</title>
</head>
<body>
    <h1>Imagem dinâmica</h1>
    <p>Tente abrir esse em vários dispositivos diferentes ou simplesmente aumentar e diminua o tamanho do seu nevegador.😄</p>
    <picture>
        <source media="(max-width: 750px)" srcset="paisagem-p.png" type="Image/png">
        <source media="(max-width: 1050px)" srcset="paisagem-m.png" type="Image/png">
        <img src="paisagem-g.png" alt="Imagem flexível">    
    </picture>
</body>
</html>
